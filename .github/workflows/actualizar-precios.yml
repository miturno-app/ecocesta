name: Actualizar precios diarios

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install node-fetch

      - name: Ejecutar scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node scripts/scraper.js

      - name: Guardar precios
        run: |
          git config user.name "EcoCesta Bot"
          git config user.email "bot@ecocesta.es"
          git add public/precios.json
          git diff --staged --quiet || git commit -m "🛒 Precios actualizados $(date +'%d/%m/%Y %H:%M')"
          git push
